<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work From Home</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
}

.container {
    padding: 20px;
}

h1 {
    color: #22c55e;
}

.form-box {
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 5px;
    border: none;
}

.btn {
    display: inline-block;
    background: #25D366;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    text-decoration: none;
    border: none;
    font-size: 16px;
}

.box {
    background: #1e293b;
    padding: 20px;
    margin: 20px;
    border-radius: 10px;
}
</style>

<script>
function sendToWhatsApp() {
    var name = document.getElementById("name").value;
    var age = document.getElementById("age").value;
    var phone = document.getElementById("phone").value;

    var message = "New Lead:%0AName: " + name + "%0AAge: " + age + "%0APhone: " + phone;

    var url = "https://wa.me/918005564525?text=" + message;

    window.open(url, "_blank");
}
</script>

</head>

<body>

<div class="container">

<h1>💼 Work From Home</h1>

<div class="form-box">
<h3>Fill Details</h3>

<input type="text" id="name" placeholder="Enter Name" required>
<input type="number" id="age" placeholder="Enter Age" required>
<input type="number" id="phone" placeholder="Enter Mobile Number" required>

<br>
<button class="btn" onclick="sendToWhatsApp()">👉 Submit & Join</button>
</div>

<div class="box">
<p>✅ Earn ₹2000-₹3000 Daily</p>
<p>✅ Work From Mobile</p>
<p>✅ No Experience Needed</p>
</div>

</div>

</body>
</html>
